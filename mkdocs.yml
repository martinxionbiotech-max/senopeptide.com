site_name: SENO Biotechnology — Technical Documentation
site_description: Official technical documentation for SENO Biotechnology peptide synthesis, purification technologies, analytical methods, and quality control systems.
site_url: https://docs.senopeptide.com
site_author: SENO Biotechnology
copyright: © 2026 Zhangjiakou SENO Biotechnology Co., Ltd. All rights reserved.

repo_url: https://github.com/senobiotech/seno-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.top
    - navigation.indexes
    - navigation.sections
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.png

plugins:
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://senopeptide.com
      name: SENO Biotechnology Official Website
  tags:
    equipment: Production Equipment
    process: Technical Process
    quality: Quality Systems
    platform: Technology Platform
    sop: Standard Operating Procedure
    specification: Technical Specification

